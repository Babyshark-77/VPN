<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统首页 - 加速器后台管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f0f2f5;
            color: #262626;
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 220px;
            background: #fff;
            border-right: 1px solid #e8e8e8;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .logo {
            height: 60px;
            display: flex;
            align-items: center;
            padding-left: 20px;
            font-size: 16px;
            font-weight: 600;
            border-bottom: 1px solid #e8e8e8;
        }
        .logo-icon {
            width: 24px;
            height: 24px;
            background: #1890ff;
            border-radius: 50% 50% 50% 0;
            margin-right: 8px;
            transform: rotate(-45deg);
        }
        .menu { flex: 1; overflow-y: auto; padding: 10px 0; }
        .menu-item {
            padding: 12px 20px;
            font-size: 14px;
            color: #595959;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
        }
        .menu-item:hover, .menu-group.active .menu-item, .menu-item.active { color: #1890ff; }
        .menu-sub {
            padding: 8px 14px 8px 42px;
            font-size: 14px;
            color: #595959;
            text-decoration: none;
            display: block;
        }
        .menu-sub.active {
            background: #e6f7ff;
            color: #1890ff;
            border-right: 3px solid #1890ff;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .header {
            height: 50px;
            background: #fff;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 14px;
            color: #8c8c8c;
            flex-shrink: 0;
        }
        .breadcrumb span { margin-right: 8px; }
        .breadcrumb .current { color: #262626; font-weight: 500; }
        .content-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .page-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 18px;
        }
        .section-panel, .chart-card {
            border: 1px solid #e8e8e8;
            border-radius: 10px;
            background: #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,.05);
            margin-bottom: 20px;
        }
