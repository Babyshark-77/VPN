<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统首页 - 加速器后台管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f0f2f5;
            color: #262626;
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 220px;
            background: #fff;
            border-right: 1px solid #e8e8e8;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .logo {
            height: 60px;
            display: flex;
            align-items: center;
            padding-left: 20px;
            font-size: 16px;
            font-weight: 600;
            border-bottom: 1px solid #e8e8e8;
        }
        .logo-icon {
            width: 24px;
            height: 24px;
            background: #1890ff;
            border-radius: 50% 50% 50% 0;
            margin-right: 8px;
            transform: rotate(-45deg);
        }
        .menu { flex: 1; overflow-y: auto; padding: 10px 0; }
        .menu-item {
            padding: 12px 20px;
            font-size: 14px;
            color: #595959;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
        }
        .menu-item:hover, .menu-group.active .menu-item, .menu-item.active { color: #1890ff; }
        .menu-sub {
            padding: 8px 14px 8px 42px;
            font-size: 14px;
            color: #595959;
            text-decoration: none;
            display: block;
        }
        .menu-sub.active {
            background: #e6f7ff;
            color: #1890ff;
            border-right: 3px solid #1890ff;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .header {
            height: 50px;
            background: #fff;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 14px;
            color: #8c8c8c;
            flex-shrink: 0;
        }
        .breadcrumb span { margin-right: 8px; }
        .breadcrumb .current { color: #262626; font-weight: 500; }
        .content-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .page-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 18px;
        }
        .section-panel, .chart-card {
            border: 1px solid #e8e8e8;
            border-radius: 10px;
            background: #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,.05);
            margin-bottom: 20px;
        }
        .panel-header {
            padding: 16px 18px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-title {
            font-size: 18px;
            font-weight: 600;
        }
        .home-date-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            padding: 18px;
        }
        .date-chip {
            padding: 7px 16px;
            border: 1px solid #1890ff;
            color: #1890ff;
            background: #fff;
            border-radius: 18px;
            cursor: pointer;
            font-size: 14px;
        }
        .date-chip.active {
            color: #fff;
            border-color: #1677ff;
            background: linear-gradient(135deg, #1677ff 0%, #2f54eb 100%);
        }
        .date-input {
            padding: 7px 10px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 14px;
            color: #262626;
            background: #fff;
        }
        .date-input:disabled {
            background: #f5f5f5;
            color: #bfbfbf;
        }
        .overview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
            padding: 16px;
        }
        .top-summary-grid {
            display: grid;
            grid-template-columns: minmax(0, 2fr) minmax(320px, 1fr);
            gap: 16px;
            align-items: start;
            margin-bottom: 20px;
        }
        .top-main-stack {
            display: grid;
            gap: 16px;
        }
        .compact-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
            padding: 16px;
        }
        .compact-grid .stat-card {
            padding: 16px;
            min-height: 148px;
        }
        .compact-grid .stat-value {
            font-size: 22px;
            line-height: 1.25;
            word-break: break-word;
        }
        .stat-card {
            border: 1px solid #e8e8e8;
            border-radius: 10px;
            background: #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,.05);
            padding: 18px;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            width: 4px;
            height: 100%;
            background: #1890ff;
        }
        .stat-card.green::before { background: #52c41a; }
        .stat-card.orange::before { background: #fa8c16; }
        .stat-card.red::before { background: #ff4d4f; }
        .stat-card.purple::before { background: #722ed1; }
        .stat-card.cyan::before { background: #13c2c2; }
        .stat-title { color: #8c8c8c; font-size: 13px; margin-bottom: 8px; }
        .stat-value { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
        .stat-desc { color: #8c8c8c; font-size: 12px; line-height: 1.5; }
        .section-note {
            color: #8c8c8c;
            font-size: 12px;
            line-height: 1.6;
            padding: 0 18px 12px;
        }
        .section-body { padding: 16px; }
        .cost-grid, .double-grid, .triple-grid {
            display: grid;
            gap: 14px;
        }
        .cost-grid { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
        .double-grid { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
        .triple-grid { grid-template-columns: repeat(3, 1fr); }
        .mini-card {
            border: 1px solid #f0f0f0;
            border-radius: 8px;
            background: #fafafa;
            padding: 14px;
        }
        .mini-label { font-size: 12px; color: #8c8c8c; margin-bottom: 6px; }
        .mini-value { font-size: 24px; font-weight: 700; }
        .chart-wrap { padding: 14px 16px; }
        .trend-chart {
            height: 260px;
            border-bottom: 1px solid #f0f0f0;
            padding: 10px 2px 24px;
            overflow: hidden;
        }
        .chart-columns {
            height: 100%;
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: 12px;
            align-items: end;
        }
        .column-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            height: 100%;
        }
        .column-bars {
            width: 100%;
            max-width: 56px;
            height: 210px;
            display: flex;
            gap: 2px;
            align-items: flex-end;
            justify-content: center;
        }
        .chart-column {
            flex: 1 1 0;
            min-width: 0;
            border-radius: 4px 4px 0 0;
        }
        .chart-label {
            margin-top: 8px;
            font-size: 12px;
            color: #8c8c8c;
        }
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 12px;
            font-size: 12px;
            color: #595959;
        }
        .chart-stack {
            display: grid;
            gap: 16px;
        }
        .line-chart {
            height: 260px;
            border-bottom: 1px solid #f0f0f0;
            padding: 8px 0 14px;
        }
        .line-chart svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        .line-axis-label {
            font-size: 11px;
            fill: #8c8c8c;
        }
        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        .distribution {
            padding: 18px;
            display: grid;
            gap: 14px;
        }
        .dist-row {
            display: grid;
            grid-template-columns: 78px 1fr 62px;
            gap: 12px;
            align-items: center;
            font-size: 13px;
        }
        .dist-track {
            height: 10px;
            border-radius: 10px;
            background: #f5f5f5;
            overflow: hidden;
        }
        .dist-fill {
            height: 100%;
            border-radius: 10px;
        }
        .table-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 14px;
        }
        .table-card {
            border: 1px solid #f0f0f0;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
        }
        .table-card .panel-header {
            padding: 14px 16px;
        }
        .table-tools {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .data-table-wrapper { overflow-x: auto; }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 100%;
        }
        .data-table th, .data-table td {
            padding: 12px 14px;
            border-bottom: 1px solid #f0f0f0;
            text-align: left;
            font-size: 14px;
            white-space: nowrap;
        }
        .data-table th {
            background: #fafafa;
            font-weight: 600;
            color: #595959;
        }
        .tag {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            line-height: 22px;
        }
        .tag.green { background: #f6ffed; color: #52c41a; }
        .tag.orange { background: #fff7e6; color: #fa8c16; }
        .tag.red { background: #fff1f0; color: #ff4d4f; }
        .action-link {
            color: #1677ff;
            cursor: pointer;
            text-decoration: none;
            margin-right: 12px;
        }
        .focus-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 14px;
            padding: 16px;
        }
        .btn {
            padding: 6px 14px;
            border: 1px solid #d9d9d9;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary {
            background: #1890ff;
            color: #fff;
            border-color: #1890ff;
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal {
            width: 640px;
            max-width: calc(100vw - 40px);
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
        }
        .modal-header, .modal-footer {
            padding: 16px 18px;
            border-bottom: 1px solid #f0f0f0;
        }
        .modal-footer {
            border-bottom: none;
            border-top: 1px solid #f0f0f0;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        .modal-title { font-size: 18px; font-weight: 600; }
        .modal-body { padding: 18px; }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px 16px;
        }
        .form-label { display: block; font-size: 13px; color: #595959; margin-bottom: 6px; }
        .form-input, .form-textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
        }
        .form-textarea { min-height: 88px; resize: vertical; }
        .modal-close {
            position: absolute;
            right: 18px;
            top: 16px;
            color: #8c8c8c;
            font-size: 22px;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            background: rgba(0,0,0,.78);
            color: #fff;
            padding: 10px 16px;
            border-radius: 24px;
            display: none;
            z-index: 1200;
            font-size: 14px;
        }
        @media (max-width: 1200px) {
            .overview-grid, .cost-grid, .triple-grid, .table-grid, .focus-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .double-grid { grid-template-columns: 1fr; }
            .top-summary-grid { grid-template-columns: 1fr; }
            .compact-grid { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
        }
        @media (max-width: 768px) {
            body { display: block; }
            .sidebar { width: 100%; }
            .overview-grid, .cost-grid, .triple-grid, .table-grid, .focus-grid, .form-grid { grid-template-columns: 1fr; }
            .content-body { padding: 16px; }
            .top-summary-grid { grid-template-columns: 1fr; }
            .compact-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }
        @media (max-width: 520px) {
            .compact-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <div class="main-content">
        <div class="header">
            <div class="breadcrumb">
                <span>&lt;</span><span>系统首页</span><span>/</span><span class="current">运营数据概览</span>
            </div>
        </div>
        <div class="content-body" id="homePage">
            <div class="page-title">系统首页</div>

            <div class="section-panel">
                <div class="home-date-filter" id="homeDateFilter"></div>
            </div>

            <div class="top-summary-grid">

                <div class="section-panel" style="margin-bottom:0;">
                    <div class="panel-header"><div class="panel-title">实时数据</div></div>

                                <div class="legend" id="homeCostTrendLegend"></div>

            document.getElementById(targetId).innerHTML = `<svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none"><line x1="${padding.left}" y1="${padding.top + innerHeight}" x2="${width - padding.right}" y2="${padding.top + innerHeight}" stroke="#f0f0f0"></line>${lines}${axisLabels}</svg>`;
            document.getElementById(legendId).innerHTML = metricsList.map(item => `<div><span class="legend-dot" style="background:${item.color};"></span>${item.label}</div>`).join('');
        }
        function renderHomeCostOverview() {
            const metrics = getHomeMetrics();
            renderCards('homeCostCards', [
                { title: '账号成本', value: money(metrics.accountCost) },
                { title: '服务器成本', value: money(metrics.serverCost) },
                { title: '流量成本', value: money(metrics.trafficCost) }
            ]);

            const range = getHomeRange();
            let series = dailyTrendData.filter(item => homeInRange(item.date));
            if (!series.length) {
                series = dailyTrendData.slice();
            }
            series = series.slice(-7);
            const fundMetrics = [
                { key: 'recharge', label: '充值金额', color: '#722ed1' },
                { key: 'total', label: '使用金额', color: '#1890ff' }
            ];
            const costMetrics = [
                { key: 'accountCost', label: '账号成本', color: '#13c2c2' },
                { key: 'server', label: '服务器成本', color: '#52c41a' },
                { key: 'traffic', label: '流量成本', color: '#fa8c16' }
            ];
            renderLineChart('homeFundTrendChart', 'homeFundTrendHint', 'homeFundTrendLegend', series, fundMetrics, { start: series[0]?.date || '', end: series[series.length - 1]?.date || '' });
            const maxValue = Math.max(...series.flatMap(item => costMetrics.map(metric => item[metric.key])), 1);
            document.getElementById('homeCostTrendHint').innerText = '近7日数据';
            document.getElementById('homeCostTrendChart').innerHTML = `<div class="chart-columns">${series.map(item => `<div class="column-group"><div class="column-bars">${costMetrics.map(metric => `<div class="chart-column" style="height:${Math.max(item[metric.key] / maxValue * 210, 4)}px;background:${metric.color};"></div>`).join('')}</div><div class="chart-label">${esc(item.date ? item.date.slice(5) : item.month)}</div></div>`).join('')}</div>`;
            document.getElementById('homeCostTrendLegend').innerHTML = costMetrics.map(item => `<div><span class="legend-dot" style="background:${item.color};"></span>${item.label}</div>`).join('');
        }
        function renderHomeNodeOverview() {
            const metrics = getHomeMetrics();
            const nodeDist = [
                ['全部节点数量', metrics.totalNodes, '#1890ff'],
                ['可用节点', metrics.currentAvailableNodes, '#52c41a'],
                ['已损耗节点', metrics.deadNodes, '#ff4d4f'],
                ['未配置成本节点', metrics.unconfiguredNodes, '#722ed1']
            ];
            const distMax = Math.max(...nodeDist.map(item => item[1]), 1);
            document.getElementById('homeNodeDistribution').innerHTML = nodeDist.map(item => `<div class="dist-row"><div class="dist-name">${item[0]}</div><div class="dist-track"><div class="dist-fill" style="width:${item[1] / distMax * 100}%;background:${item[2]};"></div></div><div class="dist-value">${item[1]}</div></div>`).join('');

            const countryMap = {};
            metrics.visibleNodes.filter(node => node.lifecycle === '正常').forEach(node => {
                const cost = nodeCost(node);
                if (!cost.configured) return;
                countryMap[node.country] = (countryMap[node.country] || 0) + cost.discounted;
            });
            const total = Object.values(countryMap).reduce((sum, item) => sum + item, 0) || 1;
            document.getElementById('homeCountryCostChart').innerHTML = Object.entries(countryMap).map(([key, value]) => `<div class="dist-row"><div class="dist-name">${esc(key)}</div><div class="dist-track"><div class="dist-fill" style="width:${value / total * 100}%;background:${countryColors[key] || '#1890ff'};"></div></div><div class="dist-value">${(value / total * 100).toFixed(1)}%</div></div>`).join('');
        }
        function renderHomeProviderOverview() {
            const metrics = getHomeMetrics();
            const providerMap = {};
            accounts.forEach(account => {
                providerMap[account.provider] = providerMap[account.provider] || { provider: account.provider, accounts: 0, nodes: 0, use: 0, balance: 0, dead: 0, available: 0, newNodes: 0, deadPeriod: 0 };
                providerMap[account.provider].accounts += 1;
                providerMap[account.provider].balance += getBalance(account);
            });
            nodes.forEach(node => {
                const entry = providerMap[node.provider] || (providerMap[node.provider] = { provider: node.provider, accounts: 0, nodes: 0, use: 0, balance: 0, dead: 0, available: 0, newNodes: 0, deadPeriod: 0 });
                entry.nodes += 1;
                if (node.lifecycle === '正常') entry.available += 1;
                if (node.lifecycle === '已挂掉') entry.dead += 1;
                if (homeInRange(node.createdAt)) entry.newNodes += 1;
                if (node.deadAt && homeInRange(node.deadAt)) entry.deadPeriod += 1;
                entry.use += homeInRange(node.period) ? nodeCost(node).discounted : 0;
            });
            accountCostLogs.forEach(log => {
                if (!homeInRange(log.time)) return;
                const account = getAccount(log.accountId);
                if (account) providerMap[account.provider].use += log.amount;
            });
            const providerRows = Object.values(providerMap).sort((a, b) => b.use - a.use);
            document.getElementById('providerCostTable').innerHTML = `<thead><tr>${['排名', '服务商', '账号数', '可用节点数', '使用金额', '当前余额', '损耗节点数'].map(item => `<th>${item}</th>`).join('')}</tr></thead><tbody>${providerRows.map((item, index) => `<tr><td>${index + 1}</td><td><a class="action-link" onclick="goToCostStatisticsWithFilter({ provider: '${item.provider}' })">${esc(item.provider)}</a></td><td>${item.accounts}</td><td>${item.available}</td><td>${money(item.use)}</td><td>${money(item.balance)}</td><td>${item.dead}</td></tr>`).join('')}</tbody>`;
            const accountRows = accounts.slice().sort((a, b) => getBalance(a) - getBalance(b));
            document.getElementById('providerBalanceTable').innerHTML = `<thead><tr>${['服务商', '账号名称', '当前余额', '账号状态', '操作'].map(item => `<th>${item}</th>`).join('')}</tr></thead><tbody>${accountRows.map(account => `<tr><td>${esc(account.provider)}</td><td>${esc(account.name)}</td><td>${money(getBalance(account))}</td><td>${tag(getAccountStatus(account))}</td><td><a class="action-link" onclick="goToCostStatisticsWithFilter({ account: '${account.name}', accountId: '${account.id}', section: 'account' })">查看账号</a></td></tr>`).join('')}</tbody>`;
            const providerNodeRows = providerRows.filter(item => item.available > 0);
            const nodeDistMax = Math.max(...providerNodeRows.map(item => item.available), 1);
            document.getElementById('providerNodeDistribution').innerHTML = providerNodeRows.map(item => `<div class="dist-row"><div class="dist-name">${esc(item.provider)}</div><div class="dist-track"><div class="dist-fill" style="width:${item.available / nodeDistMax * 100}%;background:${providerColors[item.provider] || '#1890ff'};"></div></div><div class="dist-value">${item.available}</div></div>`).join('');
        }
        function renderHomeCountryOverview() {
            const countryMap = {};
            nodes.forEach(node => {
                countryMap[node.country] = countryMap[node.country] || { country: node.country, nodes: 0, available: 0, dead: 0, traffic: 0 };
                const item = countryMap[node.country];
                item.nodes += 1;
                if (node.lifecycle === '正常') item.available += 1;
                if (node.lifecycle === '已挂掉') item.dead += 1;
                if (homeInRange(node.period)) {
                    const cost = nodeCost(node);
                    item.traffic += cost.traffic;
                }
            });
            const rows = Object.values(countryMap).sort((a, b) => b.available - a.available);
            document.getElementById('countryNodeTable').innerHTML = `<thead><tr>${['国家/地区', '节点数', '可用节点数', '已损耗节点数', '已用流量成本'].map(item => `<th>${item}</th>`).join('')}</tr></thead><tbody>${rows.map(item => `<tr><td><a class="action-link" onclick="goToCostStatisticsWithFilter({ country: '${item.country}', section: 'node' })">${esc(item.country)}</a></td><td>${item.nodes}</td><td>${item.available}</td><td>${item.dead}</td><td>${money(item.traffic)}</td></tr>`).join('')}</tbody>`;
        }
        function renderHomeFocusLists() {
            const lowBalance = accounts.filter(account => getAccountStatus(account) === '余额不足' || account.status === '停用').sort((a, b) => getBalance(a) - getBalance(b));
            document.getElementById('lowBalanceTable').innerHTML = `<thead><tr>${['服务商', '账号名称', '当前余额', '关联节点数', '最近充值时间', '操作'].map(item => `<th>${item}</th>`).join('')}</tr></thead><tbody>${lowBalance.map(account => {
                const lastRecharge = rechargeRecords.filter(item => item.accountId === account.id).sort((a, b) => parseDate(b.time) - parseDate(a.time))[0];
                const nodeCount = nodes.filter(node => node.accountId === account.id).length;
                return `<tr><td>${esc(account.provider)}</td><td>${esc(account.name)}</td><td>${money(getBalance(account))}</td><td>${nodeCount}</td><td>${lastRecharge ? esc(lastRecharge.time) : '-'}</td><td><a class="action-link" onclick="openRechargeModal('${account.id}')">去充值</a></td></tr>`;
            }).join('')}</tbody>`;

            const deadNodes = nodes.filter(node => node.deadAt).sort((a, b) => parseDate(b.deadAt) - parseDate(a.deadAt)).slice(0, 5);
            document.getElementById('deadNodeTable').innerHTML = `<thead><tr>${['挂掉时间', '节点 IP', '服务商', '服务商账号', '国家/地区', '挂掉原因', '已产生费用', '操作'].map(item => `<th>${item}</th>`).join('')}</tr></thead><tbody>${deadNodes.map(node => `<tr><td>${esc(node.deadAt)}</td><td>${esc(node.ip)}</td><td>${esc(node.provider)}</td><td>${esc(node.accountName)}</td><td>${esc(node.country)}</td><td>${esc(node.deadReason || '-')}</td><td>${money(nodeCost(node).discounted)}</td><td><a class="action-link" onclick="goToCostStatisticsWithFilter({ ip: '${node.ip}', section: 'node' })">查看节点</a></td></tr>`).join('')}</tbody>`;

            const unconfiguredNodes = nodes.filter(node => node.configStatus === '未配置');
            document.getElementById('unconfiguredNodeTable').innerHTML = `<thead><tr>${['节点 IP', '服务商', '服务商账号', '国家/地区', '服务器配置', '系统型号', '创建时间', '操作'].map(item => `<th>${item}</th>`).join('')}</tr></thead><tbody>${unconfiguredNodes.map(node => `<tr><td>${esc(node.ip)}</td><td>${esc(node.provider)}</td><td>${esc(node.accountName)}</td><td>${esc(node.country)}</td><td>${esc(node.serverSpec)}</td><td>${esc(node.systemModel)}</td><td>${esc(node.createdAt)}</td><td><a class="action-link" onclick="goToCostStatisticsWithFilter({ ip: '${node.ip}', nodeId: '${node.id}', section: 'node', action: 'edit-node' })">配置成本</a></td></tr>`).join('')}</tbody>`;
        }
        function renderHomePage() {
            renderHomeDateFilter();
            renderHomeOverviewCards();
            renderHomeRealtimeCards();
            renderHomeCostOverview();
            renderHomeNodeOverview();
            renderHomeProviderOverview();
            renderHomeCountryOverview();
            renderHomeFocusLists();
        }
        function goToCostStatisticsWithFilter(filter) {
            const params = new URLSearchParams();
            if (filter.provider) params.set('provider', filter.provider);
            if (filter.country) params.set('country', filter.country);
            if (filter.account) params.set('account', filter.account);
            if (filter.accountId) params.set('accountId', filter.accountId);
            if (filter.ip) params.set('ip', filter.ip);
            if (filter.section) params.set('section', filter.section);
            if (filter.action) params.set('action', filter.action);
            if (filter.nodeId) params.set('nodeId', filter.nodeId);
            window.location.href = `/Users/chicken_fish/Desktop/个人作业/加速器/node-cost-statistics-demo.html?${params.toString()}`;
        }
        function openRechargeModal(accountId) {
            const account = getAccount(accountId);
            document.getElementById('rechargeProvider').value = account.provider;
            document.getElementById('rechargeAccount').value = account.name;
            document.getElementById('rechargeBalance').value = money(getBalance(account));
            document.getElementById('rechargeAmount').value = '';
            document.getElementById('rechargeRemark').value = '';
            document.getElementById('rechargeModal').dataset.accountId = accountId;
            document.getElementById('rechargeModal').style.display = 'flex';
        }
        function saveRecharge() {
            const accountId = document.getElementById('rechargeModal').dataset.accountId;
            const account = getAccount(accountId);
            const amount = Number(document.getElementById('rechargeAmount').value || 0);
            if (!amount) {
                showToast('请填写充值金额');
                return;
            }
            const beforeBalance = getBalance(account);
            account.cumulativeRecharge += amount;
            rechargeRecords.unshift({ id: `recharge-${Date.now()}`, accountId, provider: account.provider, accountName: account.name, amount, currency: account.currency, time: fmtDateTime(new Date()), operator: 'admin', beforeBalance, afterBalance: beforeBalance + amount, voucher: '', remark: document.getElementById('rechargeRemark').value });
            closeModal('rechargeModal');
            renderHomePage();
            showToast('充值记录已添加');
        }
        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }
        function showToast(text) {
            const toast = document.getElementById('toast');
            toast.textContent = text;
            toast.style.display = 'block';
            clearTimeout(showToast.timer);
            showToast.timer = setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }

        renderHomePage();
    </script>
</body>
</html>
